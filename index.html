<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stacked Graph</title>
  <script type="module" crossorigin src="/stacked_graph_claude/assets/index-DdD6JQzu.js"></script>
  <link rel="stylesheet" crossorigin href="/stacked_graph_claude/assets/index-D1rI3S70.css">
<link rel="manifest" href="/stacked_graph_claude/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/stacked_graph_claude/registerSW.js"></script></head>
<body>
  <main id="app">

    <!-- CSV Input -->
    <div class="section">
      <div class="section-header">
        <button id="csv-toggle" class="toggle-btn">▼ CSV Data</button>
        <button id="sample-btn" class="secondary-btn">Generate Sample Data</button>
      </div>
      <div id="csv-panel">
        <textarea
          id="csv-input"
          placeholder="Paste CSV data here (headers required)..."
          spellcheck="false"
        ></textarea>
        <div id="csv-error" class="error-msg hidden"></div>
      </div>
    </div>

    <!-- Column Pickers -->
    <div class="section hidden" id="column-section">
      <label>Date column <select id="date-col"></select></label>
      <label>Stack by <select id="stack-col"></select></label>
    </div>

    <!-- Filters -->
    <div class="section hidden" id="filter-section">
      <label><input type="checkbox" id="filter-replace-cu"> Replace CU credit card payment with CC details</label>
      <label><input type="checkbox" id="filter-cc-credits"> Filter CC credits</label>
    </div>

    <!-- Chart -->
    <div class="section hidden" id="chart-section">
      <div class="chart-scroll">
        <canvas id="chart-canvas"></canvas>
      </div>
      <div id="legend"></div>
      <div id="month-range-wrap" class="hidden">
        <div class="range-labels">
          <span id="range-start-label"></span>
          <span id="range-end-label"></span>
        </div>
        <div class="range-slider-wrap">
          <div class="range-track"></div>
          <div id="range-fill" class="range-fill"></div>
          <input type="range" id="range-start" min="0" max="0" value="0" step="1">
          <input type="range" id="range-end"   min="0" max="0" value="0" step="1">
        </div>
      </div>
    </div>

    <!-- Debug -->
    <div class="section hidden" id="debug-section">
      <div class="section-header">
        <button id="debug-toggle" class="toggle-btn" style="font-size:12px">▼ Debug info</button>
        <button id="debug-copy" class="secondary-btn" style="margin-left:auto;font-size:11px">Copy</button>
      </div>
      <pre id="debug-output" style="font-size:11px;color:var(--muted);white-space:pre-wrap;line-height:1.6"></pre>
    </div>

    <!-- Summary -->
    <div class="section hidden" id="summary-section">
      <div class="summary-cards">
        <div id="summary-income" class="summary-card income"></div>
        <div id="summary-expenses" class="summary-card expenses"></div>
        <div id="summary-net" class="summary-card net"></div>
      </div>
    </div>

  </main>
</body>
</html>
